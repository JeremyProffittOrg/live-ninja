name: Deploy

# Deploy = push to main. This is the only allowed path to AWS (see deploy.md) —
# no local `sam deploy`, no static AWS keys, OIDC only.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys: a second push queues behind the in-flight run instead of
# racing the CloudFormation stack (no cancel — every push is a prod deploy).
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  # Path filter: the wakeword-train container image is only rebuilt when
  # containers/** changes (or on manual dispatch, as a recovery lever).
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      containers: ${{ steps.filter.outputs.containers }}
      nova: ${{ steps.filter.outputs.nova }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            containers:
              - 'containers/wakeword-train/**'
            nova:
              - 'containers/nova-bridge/**'
              - 'cmd/nova-bridge/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'

  # Builds containers/wakeword-train for linux/arm64 and pushes :latest + :<sha>
  # to the live-ninja-wakeword-train ECR repo. Runs BEFORE deploy so a template
  # change and its matching image land together. Bootstrap ordering: the ECR
  # repo itself is created by the SAM template, so on the very first run the
  # push target does not exist yet - in that case this job only *builds* (to
  # validate the Dockerfile) and the push-wakeword-container-bootstrap job
  # below pushes after deploy has created the repo.
  build-wakeword-container:
    needs: [test, changes]
    if: needs.changes.outputs.containers == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    outputs:
      pushed: ${{ steps.build.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tolerate a dispatch run from before containers/ exists in the tree.
      - name: Check container source present
        id: precheck
        run: |
          if [ -f containers/wakeword-train/Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "containers/wakeword-train/Dockerfile not in tree; nothing to build"
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.precheck.outputs.present == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-live-ninja-container-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU (arm64 emulation)
        if: steps.precheck.outputs.present == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.precheck.outputs.present == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        if: steps.precheck.outputs.present == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build (and push when the ECR repo exists)
        if: steps.precheck.outputs.present == 'true'
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -eu
          IMAGE="$REGISTRY/live-ninja-wakeword-train"
          if aws ecr describe-repositories --repository-names live-ninja-wakeword-train >/dev/null 2>&1; then
            docker buildx build --platform linux/arm64 \
              -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA}" \
              --push containers/wakeword-train
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ECR repo not created yet (first deploy); build-only, push happens post-deploy"
            docker buildx build --platform linux/arm64 containers/wakeword-train
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

  # Builds containers/nova-bridge for linux/arm64 and pushes :latest + :<sha> to
  # the live-ninja-nova-bridge ECR repo. Same bootstrap ordering as wakeword: the
  # ECR repo is created by the SAM template, so on the very first run the repo
  # doesn't exist yet — this job build-only-validates the Dockerfile and the
  # push-nova-container-bootstrap job pushes after deploy has created the repo.
  # Unlike wakeword (Batch pulls the image only when a job runs), the nova-bridge
  # ECS service needs a pullable image to reach steady state, so the deploy job
  # passes NovaBridgeDesiredCount=0 whenever the :latest image is absent (see
  # there), and the bootstrap job scales the service to 1 after pushing.
  build-nova-container:
    needs: [test, changes]
    if: needs.changes.outputs.nova == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    outputs:
      pushed: ${{ steps.build.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tolerate a dispatch run from before containers/nova-bridge exists.
      - name: Check container source present
        id: precheck
        run: |
          if [ -f containers/nova-bridge/Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "containers/nova-bridge/Dockerfile not in tree; nothing to build"
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.precheck.outputs.present == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-live-ninja-nova-container-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU (arm64 emulation)
        if: steps.precheck.outputs.present == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.precheck.outputs.present == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        if: steps.precheck.outputs.present == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build (and push when the ECR repo exists)
        if: steps.precheck.outputs.present == 'true'
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -eu
          IMAGE="$REGISTRY/live-ninja-nova-bridge"
          if aws ecr describe-repositories --repository-names live-ninja-nova-bridge >/dev/null 2>&1; then
            docker buildx build --platform linux/arm64 \
              -f containers/nova-bridge/Dockerfile \
              -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA}" \
              --push .
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ECR repo not created yet (first deploy); build-only, push happens post-deploy"
            docker buildx build --platform linux/arm64 -f containers/nova-bridge/Dockerfile .
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      # A pushed :latest does not restart the running service by itself (the
      # task definition pins the tag, not the digest) — bounce it so nova code
      # changes actually roll out. No-op when the service doesn't exist yet.
      - name: Roll the nova-bridge service onto the new image
        if: steps.build.outputs.pushed == 'true'
        run: |
          set -eu
          if aws ecs describe-services \
              --cluster live-ninja-nova-bridge \
              --services live-ninja-nova-bridge \
              --query 'services[?status==`ACTIVE`].serviceName' --output text 2>/dev/null | grep -q live-ninja-nova-bridge; then
            aws ecs update-service \
              --cluster live-ninja-nova-bridge \
              --service live-ninja-nova-bridge \
              --force-new-deployment >/dev/null
            echo "nova-bridge service rolling onto the freshly pushed image"
          else
            echo "nova-bridge service not created yet — nothing to roll"
          fi

  deploy:
    # build-wakeword-container / build-nova-container are usually skipped (no
    # matching container change); deploy must still run then - but never after a
    # failed test or container build.
    needs: [test, build-wakeword-container, build-nova-container]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      contains(fromJSON('["success", "skipped"]'), needs.build-wakeword-container.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.build-nova-container.result)
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Lambda functions (arm64)
        run: |
          # Stamped into internal/webapp.BuildVersion via the Makefile's
          # ldflags (contracts/headers.md X-LN-Server: <deployedSemver>+
          # <gitSha>). VERSION is a manually-bumped semver file at the repo
          # root; the short SHA correlates a deployed binary back to this
          # run. Exported so the Makefile's `${BUILD_VERSION:-...}` fallback
          # picks it up rather than recomputing it itself.
          export BUILD_VERSION="$(cat VERSION 2>/dev/null || echo 0.0.0)+$(git rev-parse --short HEAD)"
          make build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-live-ninja-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # Values are held only in env: indirection so they never appear as literal
      # command-line args; never echo them, never enable `set -x` in this job.
      - name: Sync secrets to SSM
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LWA_CLIENT_ID: ${{ vars.LWA_CLIENT_ID }}
          LWA_CLIENT_SECRET: ${{ secrets.LWA_CLIENT_SECRET }}
        run: |
          set -eu

          aws ssm put-parameter \
            --name "/live-ninja/prod/openai/api_key" \
            --type SecureString \
            --value "$OPENAI_API_KEY" \
            --overwrite >/dev/null

          aws ssm put-parameter \
            --name "/live-ninja/prod/gemini/api_key" \
            --type SecureString \
            --value "$GEMINI_API_KEY" \
            --overwrite >/dev/null

          aws ssm put-parameter \
            --name "/live-ninja/prod/lwa/client_id" \
            --type String \
            --value "$LWA_CLIENT_ID" \
            --overwrite >/dev/null

          aws ssm put-parameter \
            --name "/live-ninja/prod/lwa/client_secret" \
            --type SecureString \
            --value "$LWA_CLIENT_SECRET" \
            --overwrite >/dev/null

          # cred_pepper is generated once by the workflow and never rotated here;
          # only created if the parameter does not already exist.
          if aws ssm get-parameter --name "/live-ninja/prod/device/cred_pepper" >/dev/null 2>&1; then
            echo "device/cred_pepper already set, leaving as-is"
          else
            echo "device/cred_pepper not found, generating"
            GENERATED_PEPPER="$(openssl rand -hex 32)"
            aws ssm put-parameter \
              --name "/live-ninja/prod/device/cred_pepper" \
              --type SecureString \
              --value "$GENERATED_PEPPER" >/dev/null
          fi

      # A failed INITIAL create leaves ROLLBACK_COMPLETE, which blocks all
      # future deploys — clear the dead shell (idempotent; only ever matches
      # a stack that never successfully created).
      - name: Clear ROLLBACK_COMPLETE stack shell
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name live-ninja \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NONE")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting failed initial-create stack shell"
            aws cloudformation delete-stack --stack-name live-ninja
            aws cloudformation wait stack-delete-complete --stack-name live-ninja
          fi

      # M12: the nova-bridge ECS service can only reach steady state once a
      # pullable image exists. On the very first deploy the ECR repo/image do
      # not exist yet, so create the service at desiredCount 0 (stabilizes
      # instantly); the push-nova-container-bootstrap job then pushes the image
      # and scales to 1. Once :latest is present every deploy uses 1.
      - name: Determine nova-bridge desired count
        id: nova
        run: |
          set -eu
          if aws ecr describe-images \
              --repository-name live-ninja-nova-bridge \
              --image-ids imageTag=latest >/dev/null 2>&1; then
            echo "desired=1" >> "$GITHUB_OUTPUT"
            echo "imageReady=true" >> "$GITHUB_OUTPUT"
            echo "nova-bridge :latest present -> TaskDefinition+Service on, desiredCount=1"
          else
            echo "desired=0" >> "$GITHUB_OUTPUT"
            echo "imageReady=false" >> "$GITHUB_OUTPUT"
            # First deploy: repo/image absent. The ECS TaskDefinition is gated OFF
            # (NovaBridgeImageReady=false) so AWS::EarlyValidation's image-existence
            # check does not fail changeset creation. The container job then pushes
            # the image; the next deploy sets imageReady=true and brings up the service.
            echo "nova-bridge :latest absent (first deploy) -> TaskDefinition+Service gated off"
          fi

      # No `sam build`: binaries are prebuilt by `make build` into .build/<fn>/
      # (SAM's default builder for provided.* runtimes would demand a Makefile
      # inside each CodeUri dir). `sam deploy` zips the CodeUri dirs directly.
      # --resolve-s3: vars.CLOUDFORMATION_S3_BUCKET lives in us-east-2; Lambda
      # code objects must be same-region (us-east-1), so SAM manages its own
      # in-region artifact bucket.
      - name: SAM deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              DomainName=${{ vars.DOMAIN_NAME }} \
              CertificateArn=${{ vars.CERTIFICATE_ARN }} \
              HostedZoneId=${{ vars.HOSTED_ZONE_ID }} \
              OpenAIRealtimeModel=${{ vars.OPENAI_REALTIME_MODEL || 'gpt-realtime' }} \
              NovaBridgeDesiredCount=${{ steps.nova.outputs.desired }} \
              NovaBridgeImageReady=${{ steps.nova.outputs.imageReady }} \
              NovaBridgeEnable=false

      # Oversized static binaries (ORT WASM ~11 MB, wake-word ONNX models) can't
      # be served through the Fiber Lambda (>6 MB response cap → 500). Publish
      # them to the assets bucket; CloudFront serves /static/vendor/* and
      # /static/models/* from S3 (immutable). Runs after deploy so the bucket +
      # CloudFront behaviors exist.
      - name: Publish oversized static assets to S3
        run: |
          set -eu
          aws s3 sync web/static/vendor "s3://live-ninja-assets-759775734231/static/vendor" \
            --cache-control "public, max-age=31536000, immutable" --delete
          aws s3 sync web/static/models "s3://live-ninja-assets-759775734231/static/models" \
            --cache-control "public, max-age=31536000, immutable" --delete

      # M12: the nova-bridge task definition pins the image to :latest (like the
      # wakeword-train job def), so a rebuilt image with an unchanged tag string
      # produces no CloudFormation diff and the running task would keep the old
      # image. When this run rebuilt+pushed a new :latest (containers/nova-bridge
      # changed and the repo already existed), force a rolling deployment so the
      # service pulls it. Skipped on first deploy (pushed=='false' -> the
      # container-bootstrap job handles the initial 0->1 rollout instead) and on
      # runs that didn't touch the container (job skipped -> output is empty).

      # M7 log-retention hygiene: functions now log to stack-managed
      # /live-ninja/lambda/<fn> groups (30d retention) via LoggingConfig,
      # because CloudFormation cannot adopt the pre-existing auto-created
      # /aws/lambda/live-ninja-* groups. Delete those legacy groups so
      # never-expire logs don't linger — guarded on retentionInDays being
      # unset, which is only true for the unmanaged legacy groups, so this
      # is a no-op once they're gone and can never touch a stack-managed
      # group (all of which carry an explicit retention).
      - name: Delete legacy unmanaged Lambda log groups
        run: |
          set -eu
          for fn in web authorizer realtime-broker iot-ingest shadow-ingest usage-rollup email-dispatch deliverables-zipper topics-extract; do
            lg="/aws/lambda/live-ninja-$fn"
            ret=$(aws logs describe-log-groups --log-group-name-prefix "$lg" \
              --query "logGroups[?logGroupName=='$lg'].retentionInDays | [0]" --output text)
            if [ "$ret" = "None" ] || [ "$ret" = "null" ]; then
              # "None" is also what an absent group yields; delete tolerates both.
              if aws logs delete-log-group --log-group-name "$lg" 2>/dev/null; then
                echo "deleted legacy log group $lg"
              fi
            fi
          done

      # Allowed to fail on the very first deploy while DNS/CloudFront propagate;
      # subsequent runs should pass reliably.
      - name: Smoke test /healthz
        continue-on-error: true
        run: |
          set -u
          for i in $(seq 1 10); do
            if curl -fsS "https://live.jeremy.ninja/healthz"; then
              echo "smoke test passed on attempt $i"
              exit 0
            fi
            echo "attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "smoke test did not pass after retries (tolerated pre-DNS-propagation)"
          exit 1

  # First-deploy bootstrap only: when build-wakeword-container found no ECR repo
  # (created by the SAM template in the deploy job above), rebuild and push now
  # that the repo exists. Skipped on every subsequent run (pushed == 'true' or
  # the container job didn't run at all).
  push-wakeword-container-bootstrap:
    needs: [build-wakeword-container, deploy]
    if: >-
      always() &&
      needs.deploy.result == 'success' &&
      needs.build-wakeword-container.outputs.pushed == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-live-ninja-container-boot-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push wakeword-train image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -eu
          IMAGE="$REGISTRY/live-ninja-wakeword-train"
          docker buildx build --platform linux/arm64 \
            -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA}" \
            --push containers/wakeword-train

  # First-deploy bootstrap only: when build-nova-container found no ECR repo
  # (created by the SAM template in the deploy job), push the image now that the
  # repo exists, then scale the nova-bridge service from its first-deploy
  # desiredCount 0 up to 1 (the image is now pullable). Skipped on every
  # subsequent run (pushed == 'true', or the container job didn't run at all).
  push-nova-container-bootstrap:
    needs: [build-nova-container, deploy]
    if: >-
      always() &&
      needs.deploy.result == 'success' &&
      needs.build-nova-container.outputs.pushed == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-live-ninja-nova-container-boot-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push nova-bridge image (skip while Nova is disabled)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -eu
          # The nova-bridge subsystem is gated off (NovaBridgeEnable=false) and
          # its ECR repo is not created by the stack in that state. Pushing to a
          # non-existent repo would fail the pipeline for a feature that isn't
          # deployed — so skip cleanly unless the repo actually exists.
          if ! aws ecr describe-repositories --repository-names live-ninja-nova-bridge >/dev/null 2>&1; then
            echo "nova-bridge ECR repo absent (Nova disabled) — skipping image build/push."
            exit 0
          fi
          IMAGE="$REGISTRY/live-ninja-nova-bridge"
          docker buildx build --platform linux/arm64 \
            -f containers/nova-bridge/Dockerfile \
            -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA}" \
            --push .

      # Two-phase bootstrap: on the first deploy the ECS TaskDefinition + Service
      # are gated OFF (NovaBridgeImageReady=false) because the image didn't exist
      # yet, so there is no service to scale here — the image we just pushed will
      # let the NEXT deploy set NovaBridgeImageReady=true and create the service
      # already at desiredCount=1. If a service somehow exists (re-run), scale it;
      # otherwise this is a no-op.
      - name: Scale nova-bridge service to 1 (if it exists)
        run: |
          set -eu
          if aws ecs describe-services \
              --cluster live-ninja-nova-bridge \
              --services live-ninja-nova-bridge \
              --query 'services[?status==`ACTIVE`].serviceName' --output text 2>/dev/null | grep -q live-ninja-nova-bridge; then
            aws ecs update-service \
              --cluster live-ninja-nova-bridge \
              --service live-ninja-nova-bridge \
              --desired-count 1 --force-new-deployment >/dev/null
            echo "nova-bridge service scaled to desiredCount=1"
          else
            echo "nova-bridge service not created yet (image now pushed; next deploy brings it up)"
          fi
