AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  live-ninja - LWA-gated voice assistant platform (web / Android / M5Stack Tab5)
  around OpenAI GPT Realtime. M0 bootstrap stack: Fiber web app behind Lambda Web
  Adapter, HTTP API, single-table DynamoDB, KMS auth/JWT keys, S3 buckets, SQS email
  pipeline, IoT baseline, CloudFront + Route 53 edge, alarms and budgets.

Parameters:
  DomainName:
    Type: String
    Default: live.jeremy.ninja
    Description: Public domain served by CloudFront.
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (us-east-1) covering DomainName.
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone that DomainName lives in.
  OpenAIRealtimeModel:
    Type: String
    Default: gpt-realtime
    Description: OpenAI Realtime model id the realtime broker mints client secrets for.
  WakewordTrainImageTag:
    Type: String
    Default: latest
    Description: >-
      Image tag of the wakeword-train container the Batch job definition references.
      The deploy workflow pushes both :latest and :<git sha>; default tracks :latest
      so a container push alone (no template change) is picked up by the next job.
  NovaBridgeImageTag:
    Type: String
    Default: latest
    Description: >-
      M12: image tag of the nova-bridge container the ECS task definition runs. The
      deploy workflow pushes both :latest and :<git sha>; default tracks :latest so a
      container-only push is picked up by the next deploy without a template change.
  NovaBridgeDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: >-
      M12: desired running task count for the nova-bridge Fargate service. The deploy
      workflow passes 0 on the very first deploy (when the ECR image has not been
      pushed yet) so the AWS::ECS::Service create does not block waiting for a task to
      pull an image that does not exist; the container-bootstrap job then pushes the
      image and scales the service to 1. Every subsequent deploy leaves this at the
      default 1.
  NovaBridgeEnable:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Master switch for the entire M12 nova-bridge subsystem (ECS/ALB/CloudFront
      /nova/*). Default off so the core stack deploys independently of the
      Fargate voice bridge; enabled in a dedicated deploy once the bridge is
      verified. The ECR repo stays unconditional so its image persists.
  NovaBridgeImageReady:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      M12 two-phase bootstrap. The nova-bridge ECR repo is created by this stack,
      so on the first deploy no image exists yet — and AWS::EarlyValidation runs a
      ResourceExistenceCheck on the ECS TaskDefinition's container image, failing
      changeset creation. The workflow sets this to "true" only once the image is
      present in ECR; until then the TaskDefinition + Service are skipped (the ALB,
      target group, repo and CloudFront /nova/* origin still deploy). Batch job
      defs (wakeword-train) are not image-existence-checked, which is why only ECS
      needs this gate.
  CloudFrontPrefixListId:
    Type: String
    Default: pl-3b927c52
    Description: >-
      M12: the AWS-managed "com.amazonaws.global.cloudfront.origin-facing" prefix list
      id for us-east-1 (stable, documented value). The nova-bridge ALB security group
      allows ingress ONLY from this prefix list so the internet-facing ALB is reachable
      solely through the CloudFront distribution (which fronts it at /nova/*), never
      directly. This stack is pinned to us-east-1 (samconfig.toml); change this only if
      the region changes.

Globals:
  Function:
    Runtime: provided.al2023
    Handler: bootstrap
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref Table
        # debug: verbose request/response logging on every function (owner
        # request 2026-07-18) — log groups have short retention (5d), so the
        # extra volume is cheap.
        LOG_LEVEL: debug

Conditions:
  # M12: gate the nova-bridge ECS TaskDefinition + Service on the image being
  # present in ECR (see NovaBridgeImageReady). First deploy creates the repo;
  # the image is pushed; a subsequent deploy (NovaBridgeImageReady=true) brings
  # up the service. The ALB, target group, repo and CloudFront /nova/* origin
  # deploy in both phases.
  NovaBridgeReady: !Equals [!Ref NovaBridgeEnable, "true"]

Resources:
  # ------------------------------------------------------------------
  # HTTP API (no custom domain here - CloudFront fronts it)
  # ------------------------------------------------------------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: LambdaAuthorizer
        Authorizers:
          LambdaAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
            EnableFunctionDefaultPermissions: true
            # Deliberately NO Identity block (no identity sources, no caching):
            # HTTP API returns 401 without invoking the authorizer when a
            # configured identity-source header is absent, which would break
            # public routes (/, /healthz, /static/*, /auth/*, jwks, OPTIONS).
            # With no identity sources the authorizer runs on every request and
            # itself allows the public-path allowlist (it receives
            # requestContext.http.path) while denying everything else.

  # ------------------------------------------------------------------
  # Lambda functions
  # ------------------------------------------------------------------
  WebFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-web
      Description: Go Fiber app behind Lambda Web Adapter; serves /healthz and all routes.
      CodeUri: .build/web/
      MemorySize: 512
      # M7: stack-managed log group with 30-day retention. Custom-named
      # (/live-ninja/lambda/<fn>) rather than the default /aws/lambda/<fn>
      # because the default groups were already auto-created by Lambda and
      # an AWS::Logs::LogGroup at an existing name fails the deploy; the
      # legacy unmanaged groups are cleaned up post-deploy by the workflow.
      LoggingConfig:
        LogGroup: !Ref WebLogGroup
      Layers:
        - arn:aws:lambda:us-east-1:753240598075:layer:LambdaAdapterLayerArm64:25
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          PORT: "8080"
          RUST_LOG: info
          DOMAIN_NAME: !Ref DomainName
          EMAIL_QUEUE_URL: !Ref EmailQueue
          JWT_KMS_KEY_ID: !GetAtt JwtKey.Arn
          AUTH_KMS_KEY_ID: !GetAtt AuthKey.Arn
          BROKER_FUNCTION_NAME: !Ref RealtimeBrokerFunction
          SCHEDULER_GROUP: !Ref SchedulerGroup
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerRole.Arn
          OWNER_EMAIL: proffitt.jeremy@gmail.com
          # M6/M9 (wake word training + deliverables). No IOT_DATA_ENDPOINT env:
          # the app resolves the IoT data-plane endpoint at runtime via a cached
          # iot:DescribeEndpoint call (permission granted below) instead of a
          # CloudFormation custom resource — deliberate, keeps the stack free of
          # custom-resource Lambdas.
          WAKEWORDS_BUCKET: !Ref WakewordsBucket
          DELIVERABLES_BUCKET: !Ref DeliverablesBucket
          BATCH_JOB_QUEUE: !Ref WakewordTrainJobQueue
          BATCH_JOB_DEFINITION: !Ref WakewordTrainJobDefinition
          ZIPPER_FUNCTION_NAME: !Ref DeliverablesZipperFunction
          # M10/M11: memory-layer embeddings (DynamoDB-native EMB# store; no
          # S3 Vectors resources - see internal/memory) + post-session topic
          # extraction trigger.
          BEDROCK_EMBED_MODEL: amazon.titan-embed-text-v2:0
          TOPICS_EXTRACT_FUNCTION_NAME: !Ref TopicsExtractFunction
          # M7: telemetry lake — POST /api/v1/telemetry batches (max 25 events,
          # contracts/telemetry.schema.json, server-side banned-key validation)
          # are forwarded to this Direct PUT Firehose stream. Each record MUST
          # be newline-terminated JSON so the gzip objects Firehose lands in
          # the analytics bucket are directly Athena-queryable.
          TELEMETRY_FIREHOSE_STREAM_NAME: !Ref TelemetryDeliveryStream
          # M7 privacy: right-to-delete worker (DELETE /api/v1/account
          # marks status=deleting then async-invokes it) + transcript
          # LOG# retention override (days; code default is 30).
          ACCOUNT_PURGE_FUNCTION_NAME: !Ref AccountPurgeFunction
          RETENTION_DAYS: "30"
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableCrud
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:BatchGetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:BatchWriteItem
                - dynamodb:ConditionCheckItem
                - dynamodb:TransactGetItems
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"
            - Sid: LwaParams
              Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/live-ninja/prod/lwa/*"
            - Sid: SsmSecureStringDecrypt
              Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
            - Sid: JwtSign
              Effect: Allow
              Action:
                - kms:Sign
                - kms:GetPublicKey
              Resource:
                - !GetAtt JwtKey.Arn
            - Sid: AuthCrypto
              Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource:
                - !GetAtt AuthKey.Arn
            - Sid: EmailEnqueue
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt EmailQueue.Arn
            - Sid: InvokeRealtimeBroker
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt RealtimeBrokerFunction.Arn
            - Sid: DeviceControlPublish
              Effect: Allow
              Action:
                - iot:Publish
              Resource:
                - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/liveninja/*"
            - Sid: TimerSchedules
              Effect: Allow
              Action:
                - scheduler:CreateSchedule
              Resource:
                - !Sub "arn:${AWS::Partition}:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/live-ninja/*"
            - Sid: PassSchedulerRole
              Effect: Allow
              Action:
                - iam:PassRole
              Resource:
                - !GetAtt SchedulerRole.Arn
              Condition:
                StringEquals:
                  iam:PassedToService: scheduler.amazonaws.com
            # ---- M6: wake-word training (AWS Batch) ----
            - Sid: WakewordTrainSubmit
              Effect: Allow
              Action:
                - batch:SubmitJob
              Resource:
                # Job-definition ARN without the revision suffix so newer
                # revisions stay submittable without a policy update.
                - !Ref WakewordTrainJobQueue
                - !Sub "arn:${AWS::Partition}:batch:${AWS::Region}:${AWS::AccountId}:job-definition/live-ninja-wakeword-train*"
            - Sid: WakewordTrainDescribe
              Effect: Allow
              Action:
                - batch:DescribeJobs
                # ListJobs is used to count a user's active training jobs for
                # the concurrency (<=2) / daily (<=3) caps before submitting;
                # its absence 403'd every "start training" (user-reported).
                - batch:ListJobs
              # These Batch actions do not support resource-level permissions.
              Resource: "*"
            - Sid: WakewordModelsRw
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                # Model layout per contracts/wakeword-manifest.md:
                # wakewords/<wwId>/<platform>/model.onnx + manifest.json
                - !Sub "${WakewordsBucket.Arn}/wakewords/*"
            - Sid: WakewordModelsList
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt WakewordsBucket.Arn
              Condition:
                StringLike:
                  s3:prefix: "wakewords/*"
            # ---- M6: settings fan-out to the M5Stack via IoT named shadow
            # "config" (contracts/shadow.md). Shadow actions are resourced on
            # the Thing ARN; the "config" shadow name is enforced in code
            # (there is no reliable IAM condition key for named shadows).
            - Sid: ConfigShadowRw
              Effect: Allow
              Action:
                - iot:GetThingShadow
                - iot:UpdateThingShadow
              Resource:
                - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*"
            # Runtime discovery of the account's IoT data-plane (ATS) endpoint;
            # called once per cold start and cached (replaces an IOT_DATA_ENDPOINT
            # env / CFN custom resource). No resource-level support.
            - Sid: IotEndpointDiscovery
              Effect: Allow
              Action:
                - iot:DescribeEndpoint
              Resource: "*"
            # ---- M9: deliverables store ----
            - Sid: DeliverablesRw
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource:
                # deliverables/<uid>/... — download handlers MUST additionally
                # prefix-check deliverables/<uid>/ before presigning (api.md).
                - !Sub "${DeliverablesBucket.Arn}/deliverables/*"
            - Sid: DeliverablesList
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt DeliverablesBucket.Arn
              Condition:
                StringLike:
                  s3:prefix: "deliverables/*"
            - Sid: InvokeDeliverablesZipper
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt DeliverablesZipperFunction.Arn
            # ---- M10: memory-layer embeddings (DynamoDB-native EMB# store;
            # S3 Vectors SDK support not confirmed for the pinned aws-sdk-go-v2
            # version, so the locked fallback is a brute-force cosine scan
            # Query over each user's own EMB# partition - internal/memory).
            # Scoped to the single embedding model id; no other Bedrock models
            # or InvokeModel* actions are granted.
            - Sid: BedrockEmbedModel
              Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v2:0"
            # ---- M11: post-session topic extraction, direct async invoke
            # from the transcript sink when it sees {final:true}.
            - Sid: InvokeTopicsExtract
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt TopicsExtractFunction.Arn
            # ---- M7: telemetry lake ingest (batched PutRecordBatch only —
            # single-record PutRecord deliberately not granted; the handler
            # always batches).
            - Sid: TelemetryFirehosePut
              Effect: Allow
              Action:
                - firehose:PutRecordBatch
              Resource:
                - !GetAtt TelemetryDeliveryStream.Arn
            # ---- M7 privacy: DELETE /api/v1/account async-invokes the
            # right-to-delete worker after marking status=deleting.
            - Sid: InvokeAccountPurge
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt AccountPurgeFunction.Arn

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-authorizer
      Description: >-
        HTTP API v2 simple-response Lambda authorizer, attached to the HTTP API as
        DefaultAuthorizer (M1). Deny-by-default; allows only explicitly public routes.
      CodeUri: .build/authorizer/
      LoggingConfig:
        LogGroup: !Ref AuthorizerLogGroup
      Environment:
        Variables:
          JWKS_URL: !Sub "https://${DomainName}/.well-known/jwks.json"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: UserReadForTokensValidAfter
              Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !GetAtt Table.Arn

  RealtimeBrokerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-realtime-broker
      Description: >-
        Direct-invoke realtime token broker (invoked by the web function in M2+).
        Sole holder of ssm:GetParameter on the OpenAI API key parameter.
      CodeUri: .build/realtime-broker/
      LoggingConfig:
        LogGroup: !Ref RealtimeBrokerLogGroup
      Environment:
        Variables:
          OPENAI_REALTIME_MODEL: !Ref OpenAIRealtimeModel
          # M7 cost/quota: hourly-burn auto-suspend owner alert (enqueued to
          # the email queue; cmd/email-dispatch sends via SES) + LOG# ledger
          # TTL override (days; code default is 30).
          EMAIL_QUEUE_URL: !Ref EmailQueue
          OWNER_EMAIL: proffitt.jeremy@gmail.com
          RETENTION_DAYS: "30"
          # M12 FR-VE-03: WSS base the session bootstrap hands nova-sonic-pinned
          # devices. The bridge is NOT on a subdomain — it is fronted by the same
          # CloudFront distribution under the /nova/* behavior (see the
          # nova-bridge origin + PathPattern /nova/* below), so the base is the
          # primary domain plus the /nova prefix and BuildBridgeSession appends
          # /session -> wss://<domain>/nova/session (matches NovaBridgeWsUrl).
          NOVA_BRIDGE_URL: !Sub "wss://${DomainName}/nova"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: SuspendAlertEnqueue
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt EmailQueue.Arn
            - Sid: TableUsageBucketLog
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
            - Sid: OpenAiKeyParam
              Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/live-ninja/prod/openai/api_key"
            - Sid: SsmSecureStringDecrypt
              Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

  IotIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-iot-ingest
      Description: IoT rule target - parses device telemetry and records DEVICE#/TELEM lastSeen.
      CodeUri: .build/iot-ingest/
      LoggingConfig:
        LogGroup: !Ref IotIngestLogGroup
      Events:
        Telemetry:
          Type: IoTRule
          Properties:
            AwsIotSqlVersion: "2016-03-23"
            Sql: "SELECT *, topic(2) as deviceId FROM 'liveninja/+/telemetry'"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableWrite
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn

  ShadowIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-shadow-ingest
      Description: >-
        IoT rule target (M6) - consumes named-shadow "config" update/accepted events and
        folds device reported state back into DynamoDB (DEVICE# lastSeen/reportedVersion;
        never downgrades the canonical SETTINGS# version - contracts/shadow.md).
      CodeUri: .build/shadow-ingest/
      LoggingConfig:
        LogGroup: !Ref ShadowIngestLogGroup
      Events:
        ConfigShadowAccepted:
          Type: IoTRule
          Properties:
            AwsIotSqlVersion: "2016-03-23"
            # topic(3) is <thingName> in $aws/things/<thingName>/shadow/name/config/update/accepted
            Sql: "SELECT topic(3) as thingName, * FROM '$aws/things/+/shadow/name/config/update/accepted'"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableReconcile
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"
            # Re-publish desired when a device reports a stale settingsVersion
            # (self-healing push-down, contracts/shadow.md step 2/4). Named
            # shadow "config" enforced in code; shadow actions resource on the
            # Thing ARN.
            - Sid: ConfigShadowRepublish
              Effect: Allow
              Action:
                - iot:GetThingShadow
                - iot:UpdateThingShadow
              Resource:
                - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*"
            # Cached cold-start lookup of the IoT data-plane endpoint (no
            # IOT_DATA_ENDPOINT env / custom resource; no resource-level support).
            - Sid: IotEndpointDiscovery
              Effect: Allow
              Action:
                - iot:DescribeEndpoint
              Resource: "*"

  UsageRollupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-usage-rollup
      Description: Hourly usage rollup - Query-only reads of the USAGE partition, emits EMF metrics.
      CodeUri: .build/usage-rollup/
      LoggingConfig:
        LogGroup: !Ref UsageRollupLogGroup
      Timeout: 60
      Events:
        Hourly:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Description: live-ninja hourly usage rollup
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableQuery
              Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"

  EmailDispatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-email-dispatch
      Description: SQS consumer - sends templated email via SES with DynamoDB idempotency.
      CodeUri: .build/email-dispatch/
      LoggingConfig:
        LogGroup: !Ref EmailDispatchLogGroup
      Environment:
        Variables:
          # M7: sends MUST pass this as ConfigurationSetName so SES streams
          # bounce/complaint events to the ops SNS topic (email alert — the
          # $0 alternative to per-notification polling).
          EMAIL_CONFIGURATION_SET: !Ref SesConfigurationSet
      Events:
        EmailJobs:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailQueue.Arn
            BatchSize: 10
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: SesSend
              Effect: Allow
              Action:
                - ses:SendEmail
              Resource:
                - !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/jeremy.ninja"
                - !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/jeremy@jeremy.ninja"
                # Sending with a ConfigurationSetName also authorizes against
                # the configuration-set ARN (M7 bounce/complaint wiring).
                - !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:configuration-set/${SesConfigurationSet}"
            - Sid: IdempotencyWrite
              Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                - !GetAtt Table.Arn
            - Sid: QueueConsume
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource:
                - !GetAtt EmailQueue.Arn

  DeliverablesZipperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-deliverables-zipper
      Description: >-
        Direct-invoke streaming zipper (M9) - invoked async by the web function's
        deliverable_zip tool; streams S3 objects through archive/zip + io.Pipe into a
        new deliverable object (no /tmp spooling of the full archive).
      CodeUri: .build/deliverables-zipper/
      LoggingConfig:
        LogGroup: !Ref DeliverablesZipperLogGroup
      MemorySize: 512
      Timeout: 300
      Environment:
        Variables:
          DELIVERABLES_BUCKET: !Ref DeliverablesBucket
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableDeliverables
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"
            - Sid: DeliverablesRw
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:AbortMultipartUpload
              Resource:
                - !Sub "${DeliverablesBucket.Arn}/deliverables/*"
            - Sid: DeliverablesList
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt DeliverablesBucket.Arn
              Condition:
                StringLike:
                  s3:prefix: "deliverables/*"

  TopicsExtractFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-topics-extract
      Description: >-
        Direct-invoke post-session topic extraction (M11) - invoked async by the web
        function on {final:true}. Queries a session's LOG# turns, calls the realtime
        broker's "extract-topics" mode, writes CONV#/TOPICREF#/TOPIC# items. Query-only.
      CodeUri: .build/topics-extract/
      LoggingConfig:
        LogGroup: !Ref TopicsExtractLogGroup
      Timeout: 60
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableConversationsAndTopics
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
            - Sid: InvokeRealtimeBrokerExtractTopics
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt RealtimeBrokerFunction.Arn

  AccountPurgeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-account-purge
# Right-to-delete worker (M7), async-invoked by DELETE /api/v1/account.
      # Query-paginates USER#/DEVICE# partitions into BatchWriteItem deletes
      # (never a Scan), purges the user's S3 prefixes, tears down IoT
      # thing/cert material, enqueues the SES confirmation. Idempotent and
      # resumable - a retried invoke re-runs to completion.
      Description: >-
        Direct-invoke right-to-delete worker (M7) - invoked async by the web
        function's DELETE /api/v1/account. Table purge + S3 prefix purge + IoT
        teardown + SES confirmation enqueue. Idempotent/resumable.
      CodeUri: .build/account-purge/
      MemorySize: 512
      Timeout: 300
      Environment:
        Variables:
          DELIVERABLES_BUCKET: !Ref DeliverablesBucket
          USER_BUCKET: !Ref UserBucket
          WAKEWORDS_BUCKET: !Ref WakewordsBucket
          EMAIL_QUEUE_URL: !Ref EmailQueue
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TablePurge
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:BatchWriteItem
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"
            - Sid: PurgeDeliverablesPrefix
              Effect: Allow
              Action:
                - s3:DeleteObject
              Resource:
                - !Sub "${DeliverablesBucket.Arn}/deliverables/*"
            - Sid: PurgeUserPrefix
              Effect: Allow
              Action:
                - s3:DeleteObject
              Resource:
                - !Sub "${UserBucket.Arn}/users/*"
            - Sid: PurgeWakewordsPrefix
              Effect: Allow
              Action:
                - s3:DeleteObject
              Resource:
                - !Sub "${WakewordsBucket.Arn}/wakewords/*"
            - Sid: PurgeListBuckets
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt DeliverablesBucket.Arn
                - !GetAtt UserBucket.Arn
                - !GetAtt WakewordsBucket.Arn
              Condition:
                StringLike:
                  s3:prefix:
                    - "deliverables/*"
                    - "users/*"
                    - "wakewords/*"
            # IoT teardown for provisioned devices (thing/cert material on
            # DEVICE items). Detach/delete actions; cert + policy actions
            # have partial resource-level support - scoped where possible.
            - Sid: IotDeviceTeardown
              Effect: Allow
              Action:
                - iot:ListAttachedPolicies
                - iot:DetachPolicy
                - iot:DetachThingPrincipal
                - iot:UpdateCertificate
                - iot:DeleteCertificate
                - iot:DeleteThing
              Resource: "*"
            - Sid: EmailConfirm
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt EmailQueue.Arn

  # ------------------------------------------------------------------
  # M7: explicit stack-managed Lambda log groups, 30-day retention.
  #
  # Lambda's implicitly-created /aws/lambda/<fn> groups default to
  # never-expire; five of them already exist in the account (created on
  # first invoke), and CloudFormation cannot adopt an existing log group
  # (AWS::Logs::LogGroup create fails with AlreadyExists) — a
  # delete-before-deploy would race live traffic re-creating the group.
  # So every function instead declares LoggingConfig pointing at a
  # fresh custom-named group here (/live-ninja/lambda/<fn>); the legacy
  # unmanaged /aws/lambda/live-ninja-* groups are deleted (guarded on
  # retention==null, i.e. not stack-managed) by a post-deploy workflow
  # step. Exception: account-purge does not exist in AWS yet, so its
  # group can safely use the default /aws/lambda/ name and applies even
  # if the function omits LoggingConfig.
  # ------------------------------------------------------------------
  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/web
      RetentionInDays: 5

  AuthorizerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/authorizer
      RetentionInDays: 5

  RealtimeBrokerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/realtime-broker
      RetentionInDays: 5

  IotIngestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/iot-ingest
      RetentionInDays: 5

  ShadowIngestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/shadow-ingest
      RetentionInDays: 5

  UsageRollupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/usage-rollup
      RetentionInDays: 5

  EmailDispatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/email-dispatch
      RetentionInDays: 5

  DeliverablesZipperLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/deliverables-zipper
      RetentionInDays: 5

  TopicsExtractLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /live-ninja/lambda/topics-extract
      RetentionInDays: 5

  # M7 account-purge Lambda (cmd/account-purge, added in this milestone —
  # FunctionName must be live-ninja-account-purge). Default-name group is
  # safe here because the function has never existed in AWS, so Lambda has
  # never auto-created it; retention applies with or without a
  # LoggingConfig on the function.
  AccountPurgeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/live-ninja-account-purge
      RetentionInDays: 5

  # ------------------------------------------------------------------
  # DynamoDB single table
  # ------------------------------------------------------------------
  Table:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: live-ninja
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ------------------------------------------------------------------
  # KMS keys
  # ------------------------------------------------------------------
  AuthKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: live-ninja auth key - envelope encryption of LWA refresh tokens and auth material.
      KeySpec: SYMMETRIC_DEFAULT
      KeyUsage: ENCRYPT_DECRYPT
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AccountRootAdmin
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"

  AuthKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/live-ninja-auth
      TargetKeyId: !Ref AuthKey

  JwtKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: live-ninja JWT signing key - ES256 (ECC_NIST_P256); private key never leaves KMS.
      KeySpec: ECC_NIST_P256
      KeyUsage: SIGN_VERIFY
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AccountRootAdmin
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"

  JwtKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/live-ninja-jwt
      TargetKeyId: !Ref JwtKey

  # ------------------------------------------------------------------
  # S3 buckets
  # ------------------------------------------------------------------
  UserBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-user-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  WakewordsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-wakewords-759775734231
      # Browsers fetch trained wake-word models via presigned URLs from
      # wakeword.mjs — a cross-origin fetch that dies as a bare "Failed to
      # fetch" without CORS (prod 2026-07-18: hands-free couldn't start
      # after the first real model trained).
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["https://live.jeremy.ninja"]
            AllowedHeaders: ["*"]
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-assets-759775734231
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # Oversized static assets (the ~11 MB onnxruntime-web WASM, wake-word ONNX
  # models) cannot be served through the Fiber Lambda — they exceed Lambda's
  # ~6 MB synchronous response payload limit (the WASM 500'd in prod). They
  # live in AssetsBucket and are served directly by CloudFront via an
  # origin-access-control (the bucket stays fully private).
  AssetsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: live-ninja-assets-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AssetsBucket}/static/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  LogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-logs-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AnalyticsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-analytics-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ------------------------------------------------------------------
  # M7: telemetry lake — web fn (POST /api/v1/telemetry, schema-validated,
  # no transcript content) --PutRecordBatch--> Firehose (Direct PUT, gzip,
  # 5 min / 5 MB buffers) --> s3://<analytics>/telemetry/ --> Glue table
  # --> Athena workgroup. Records are newline-delimited JSON envelopes per
  # contracts/telemetry.schema.json.
  # ------------------------------------------------------------------
  TelemetryFirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/kinesisfirehose/live-ninja-telemetry
      RetentionInDays: 5

  TelemetryFirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref TelemetryFirehoseLogGroup
      LogStreamName: S3Delivery

  TelemetryFirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: live-ninja-telemetry-firehose
      Description: Assumed by Kinesis Data Firehose to land gzip'd telemetry batches in the analytics bucket.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref AWS::AccountId
      Policies:
        - PolicyName: telemetry-s3-delivery
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AnalyticsWrite
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt AnalyticsBucket.Arn
                  - !Sub "${AnalyticsBucket.Arn}/*"
              - Sid: DeliveryErrorLogs
                Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource:
                  - !Sub "${TelemetryFirehoseLogGroup.Arn}:log-stream:*"

  TelemetryDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: live-ninja-telemetry
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt AnalyticsBucket.Arn
        RoleARN: !GetAtt TelemetryFirehoseRole.Arn
        # Locked buffers: whichever of 5 minutes / 5 MB fills first.
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: GZIP
        Prefix: "telemetry/"
        ErrorOutputPrefix: "telemetry-errors/"
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref TelemetryFirehoseLogGroup
          LogStreamName: !Ref TelemetryFirehoseLogStream

  AnalyticsGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: live_ninja
        Description: live-ninja self-hosted telemetry/analytics lake (Athena over the analytics bucket).

  # Schema mirrors contracts/telemetry.schema.json. attrs stays a raw JSON
  # string (query with json_extract / json_extract_scalar) because its keys
  # are open-ended per event; the OpenX SerDe lower-cases JSON keys onto the
  # lower-cased column names below. Firehose's default yyyy/MM/dd/HH key
  # layout under telemetry/ is read recursively — no partitions to manage.
  AnalyticsTelemetryTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref AnalyticsGlueDatabase
      TableInput:
        Name: telemetry_events
        Description: Telemetry event envelopes (contracts/telemetry.schema.json) landed by the live-ninja-telemetry Firehose stream.
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          compressionType: gzip
        StorageDescriptor:
          Location: !Sub "s3://${AnalyticsBucket}/telemetry/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              ignore.malformed.json: "true"
          Columns:
            - Name: event
              Type: string
            - Name: deviceid
              Type: string
            - Name: surface
              Type: string
            - Name: ts
              Type: string
            - Name: sessionid
              Type: string
            - Name: userid
              Type: string
            - Name: attrs
              Type: string

  AnalyticsWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: live-ninja-analytics
      Description: Athena workgroup for the live-ninja telemetry lake; results land back in the analytics bucket.
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true
        # Cost guard: no single query may scan more than 1 GB.
        BytesScannedCutoffPerQuery: 1073741824
        ResultConfiguration:
          OutputLocation: !Sub "s3://${AnalyticsBucket}/athena-results/"

  DeliverablesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-deliverables-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          # M9: deliverables are transient work products - expire after 180 days
          # (locked decision) and clean up abandoned multipart zip uploads.
          - Id: expire-deliverables-180d
            Status: Enabled
            ExpirationInDays: 180
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # ------------------------------------------------------------------
  # SQS email pipeline
  # ------------------------------------------------------------------
  EmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: live-ninja-email
      VisibilityTimeout: 180
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailDeadLetterQueue.Arn
        maxReceiveCount: 5

  EmailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: live-ninja-email-dlq
      MessageRetentionPeriod: 1209600

  # ------------------------------------------------------------------
  # M6: wake-word training - ECR + AWS Batch on Fargate (arm64)
  #
  # openWakeWord training runs as a Batch job (2 vCPU / 8 GB, 20-min hard
  # timeout). Concurrency <= 2 is enforced structurally: MaxvCpus 4 with
  # 2-vCPU jobs means at most two run at once; the <=3/day/user quota is
  # enforced by the web function before SubmitJob. Porcupine has NO
  # server-side training path (needs a Picovoice account - locked
  # decision); openWakeWord is the only engine trained here.
  #
  # Fargate requires VPC networking; the account has no stack VPC, so a
  # minimal dedicated VPC (public subnets + IGW, NO NAT gateway - $0
  # recurring) is created here. Jobs get a public IP for ECR pulls and
  # S3/DynamoDB/SQS access; the security group allows egress only.
  # ------------------------------------------------------------------
  WakewordTrainRepo:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: live-ninja-wakeword-train
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: '{"rules":[{"rulePriority":1,"description":"keep last 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}'

  BatchVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: live-ninja-batch

  BatchInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: live-ninja-batch

  BatchVpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref BatchVpc
      InternetGatewayId: !Ref BatchInternetGateway

  BatchPublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref BatchVpc
      CidrBlock: 10.42.0.0/20
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: live-ninja-batch-a

  BatchPublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref BatchVpc
      CidrBlock: 10.42.16.0/20
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: live-ninja-batch-b

  BatchRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BatchVpc
      Tags:
        - Key: Name
          Value: live-ninja-batch

  BatchDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: BatchVpcGatewayAttachment
    Properties:
      RouteTableId: !Ref BatchRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref BatchInternetGateway

  BatchSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref BatchPublicSubnetA
      RouteTableId: !Ref BatchRouteTable

  BatchSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref BatchPublicSubnetB
      RouteTableId: !Ref BatchRouteTable

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: live-ninja wakeword-train Fargate tasks - egress only, no ingress.
      VpcId: !Ref BatchVpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all egress (ECR pull, S3/DynamoDB/SQS, TTS asset fetch).

  WakewordTrainExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: live-ninja-wakeword-train-exec
      Description: ECS task execution role for wakeword-train Batch jobs (ECR pull + CloudWatch logs).
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  WakewordTrainJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: live-ninja-wakeword-train-job
      Description: >-
        Task role assumed by the wakeword-train container: upload trained models +
        manifests to the wakewords bucket, flip WAKEWORD# status in DynamoDB, and
        enqueue the SES "ready" email.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: wakeword-train
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ModelUpload
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource:
                  - !Sub "${WakewordsBucket.Arn}/wakewords/*"
              - Sid: WakewordStatus
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt Table.Arn
              - Sid: ReadyEmailEnqueue
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt EmailQueue.Arn

  WakewordTrainComputeEnv:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: live-ninja-wakeword-train
      Type: MANAGED
      State: ENABLED
      # No ServiceRole: Batch uses the AWSServiceRoleForBatch service-linked role.
      ComputeResources:
        Type: FARGATE
        MaxvCpus: 4
        Subnets:
          - !Ref BatchPublicSubnetA
          - !Ref BatchPublicSubnetB
        SecurityGroupIds:
          - !Ref BatchSecurityGroup

  WakewordTrainJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: live-ninja-wakeword-train
      State: ENABLED
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref WakewordTrainComputeEnv

  WakewordTrainJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: live-ninja-wakeword-train
      Type: container
      PlatformCapabilities:
        - FARGATE
      # 20-minute hard timeout (locked decision) - Batch kills the task after this.
      Timeout:
        AttemptDurationSeconds: 1200
      RetryStrategy:
        Attempts: 1
      ContainerProperties:
        Image: !Sub "${WakewordTrainRepo.RepositoryUri}:${WakewordTrainImageTag}"
        ResourceRequirements:
          - Type: VCPU
            Value: "2"
          - Type: MEMORY
            Value: "8192"
        RuntimePlatform:
          CpuArchitecture: ARM64
          OperatingSystemFamily: LINUX
        NetworkConfiguration:
          AssignPublicIp: ENABLED
        ExecutionRoleArn: !GetAtt WakewordTrainExecutionRole.Arn
        JobRoleArn: !GetAtt WakewordTrainJobRole.Arn
        # Per-job parameters (wwId, userId, phrase) are passed by SubmitJob
        # containerOverrides.environment from the web function.
        Environment:
          - Name: TABLE_NAME
            Value: !Ref Table
          - Name: WAKEWORDS_BUCKET
            Value: !Ref WakewordsBucket
          - Name: EMAIL_QUEUE_URL
            Value: !Ref EmailQueue

  # ------------------------------------------------------------------
  # M12: Nova Sonic media bridge (FR-VE-01..04)
  #
  # OpenAI-pinned devices stay client-direct (unchanged). Devices pinned to
  # nova-sonic (settings.voiceEngine) cannot go client-direct: Bedrock
  # InvokeModelWithBidirectionalStream is an HTTP/2 + SigV4, server-held
  # session — so a device pinned to Nova routes audio
  # device <-> nova-bridge <-> Bedrock Nova Sonic. Lambda cannot hold a
  # bidirectional stream, so the bridge is a small long-lived Go WSS server
  # on Fargate (arm64, 256 CPU / 512 MB, one task) that holds both the
  # client WebSocket and the Bedrock bidirectional stream for the session.
  #
  # Edge exposure: rather than a new cert/subdomain (the ACM cert covers
  # live.jeremy.ninja only), the bridge is fronted by the EXISTING CloudFront
  # distribution as a /nova/* behavior over a second origin (the ALB). So the
  # session bootstrap hands clients wss://live.jeremy.ninja/nova/session and
  # CloudFront terminates TLS with the existing cert — no SAN change, no new
  # Route53 record. The ALB is internet-facing but its security group only
  # admits CloudFront's origin-facing prefix list, so it is not directly
  # reachable. Auth is in the bridge itself: it verifies the first-party JWT
  # (public JWKS at https://live.jeremy.ninja/.well-known/jwks.json) and gates
  # quota (DynamoDB) BEFORE opening the Bedrock stream.
  #
  # VPC: reuses the existing BatchVpc + its two public subnets (IGW route,
  # MapPublicIpOnLaunch). Fargate tasks run with a public IP so ECR pulls,
  # Bedrock, DynamoDB, CloudWatch Logs and the public JWKS are all reached via
  # the IGW — no NAT gateway ($0 recurring), matching the wakeword design.
  #
  # The container (containers/nova-bridge, owned separately) MUST:
  #   * listen on port 8080,
  #   * answer GET /healthz with 200 (ALB target-group health check hits the
  #     task directly, not via CloudFront's /nova/ prefix),
  #   * serve the WebSocket bridge under the /nova/ path prefix that CloudFront
  #     forwards verbatim (e.g. GET /nova/session).
  # ------------------------------------------------------------------
  NovaBridgeRepo:
    Type: AWS::ECR::Repository
    Condition: NovaBridgeReady
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: live-ninja-nova-bridge
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: '{"rules":[{"rulePriority":1,"description":"keep last 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}'

  NovaBridgeLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: NovaBridgeReady
    Properties:
      LogGroupName: /live-ninja/ecs/nova-bridge
      RetentionInDays: 5

  NovaBridgeExecutionRole:
    Type: AWS::IAM::Role
    Condition: NovaBridgeReady
    Properties:
      RoleName: live-ninja-nova-bridge-exec
      Description: ECS task execution role for the nova-bridge service (ECR pull + CloudWatch Logs).
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  NovaBridgeTaskRole:
    Type: AWS::IAM::Role
    Condition: NovaBridgeReady
    Properties:
      RoleName: live-ninja-nova-bridge-task
      Description: >-
        Task role for the nova-bridge container: open the Bedrock Nova Sonic
        bidirectional stream and read/record the per-user realtime quota in DynamoDB.
        JWT verification uses the public JWKS endpoint (no IAM); transcript/tool
        fan-out is HTTP to the first-party API with the user's JWT (no IAM).
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: nova-bridge
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Scoped to the single Nova Sonic model id; bidirectional-stream
              # action only (Bedrock's held HTTP/2 session for realtime audio).
              - Sid: NovaSonicBidirectionalStream
                Effect: Allow
                Action:
                  - bedrock:InvokeModelWithBidirectionalStream
                Resource:
                  - !Sub "arn:${AWS::Partition}:bedrock:us-east-1::foundation-model/amazon.nova-sonic-v1:0"
              # Realtime quota gate — same USAGE-partition access the broker
              # uses (key lookups / Query only, no Scan).
              - Sid: RealtimeQuota
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt Table.Arn
                  - !Sub "${Table.Arn}/index/*"

  NovaBridgeCluster:
    Type: AWS::ECS::Cluster
    Condition: NovaBridgeReady
    Properties:
      ClusterName: live-ninja-nova-bridge

  # ALB security group: ingress ONLY from CloudFront's origin-facing managed
  # prefix list, so the internet-facing ALB is reachable solely through the
  # CloudFront /nova/* behavior (WAF + TLS applied there), never directly.
  NovaBridgeAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: NovaBridgeReady
    Properties:
      GroupDescription: live-ninja nova-bridge ALB - ingress from CloudFront origin-facing prefix list only.
      VpcId: !Ref BatchVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !Ref CloudFrontPrefixListId
          Description: HTTP from CloudFront edge only (TLS terminated at CloudFront).
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all egress (to the Fargate service targets).

  # Service security group: ingress on the container port from the ALB SG
  # only; egress open (ECR pull, Bedrock, DynamoDB, Logs, public JWKS).
  NovaBridgeServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: NovaBridgeReady
    Properties:
      GroupDescription: live-ninja nova-bridge Fargate tasks - ingress from the ALB SG only, egress open.
      VpcId: !Ref BatchVpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all egress (ECR pull, Bedrock bidirectional stream, DynamoDB, CloudWatch Logs, public JWKS fetch).

  NovaBridgeServiceIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: NovaBridgeReady
    Properties:
      GroupId: !Ref NovaBridgeServiceSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref NovaBridgeAlbSecurityGroup
      Description: Container port 8080 from the nova-bridge ALB only.

  NovaBridgeAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: NovaBridgeReady
    Properties:
      Name: live-ninja-nova-bridge
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref BatchPublicSubnetA
        - !Ref BatchPublicSubnetB
      SecurityGroups:
        - !Ref NovaBridgeAlbSecurityGroup
      LoadBalancerAttributes:
        # Long idle timeout so held WebSocket sessions are not reaped mid-turn.
        - Key: idle_timeout.timeout_seconds
          Value: "3600"

  NovaBridgeTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: NovaBridgeReady
    Properties:
      Name: live-ninja-nova-bridge
      # Fargate awsvpc networking -> IP targets.
      TargetType: ip
      VpcId: !Ref BatchVpc
      Protocol: HTTP
      Port: 8080
      HealthCheckProtocol: HTTP
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"

  NovaBridgeListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: NovaBridgeReady
    Properties:
      LoadBalancerArn: !Ref NovaBridgeAlb
      # HTTP only: TLS is terminated at CloudFront with the existing cert; the
      # ALB is private to CloudFront via the origin-facing prefix-list SG.
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NovaBridgeTargetGroup

  NovaBridgeTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: NovaBridgeReady
    Properties:
      Family: live-ninja-nova-bridge
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: "256"
      Memory: "512"
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt NovaBridgeExecutionRole.Arn
      TaskRoleArn: !GetAtt NovaBridgeTaskRole.Arn
      ContainerDefinitions:
        - Name: nova-bridge
          Image: !Sub "${NovaBridgeRepo.RepositoryUri}:${NovaBridgeImageTag}"
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "8080"
            - Name: TABLE_NAME
              Value: !Ref Table
            - Name: DOMAIN_NAME
              Value: !Ref DomainName
            - Name: JWKS_URL
              Value: !Sub "https://${DomainName}/.well-known/jwks.json"
            - Name: NOVA_SONIC_MODEL_ID
              Value: amazon.nova-sonic-v1:0
            - Name: BEDROCK_REGION
              Value: us-east-1
            - Name: API_BASE_URL
              Value: !Sub "https://${DomainName}"
            - Name: LOG_LEVEL
              Value: debug
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref NovaBridgeLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: nova-bridge

  NovaBridgeService:
    Type: AWS::ECS::Service
    Condition: NovaBridgeReady
    # The listener must exist before the service registers with the target
    # group (ELB association ordering).
    DependsOn:
      - NovaBridgeListener
    Properties:
      ServiceName: live-ninja-nova-bridge
      Cluster: !Ref NovaBridgeCluster
      LaunchType: FARGATE
      TaskDefinition: !Ref NovaBridgeTaskDefinition
      # Scale-to-1 baseline. On the very first deploy the workflow passes 0
      # (image not pushed yet) so create does not block on an unpullable image;
      # the container-bootstrap job then pushes and scales to 1.
      DesiredCount: !Ref NovaBridgeDesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      # Give a freshly-placed task time to pass the first health checks before
      # the ALB can mark it unhealthy.
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          # Public IP required for IGW-based egress (no NAT), matching the
          # wakeword-train Fargate design.
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref BatchPublicSubnetA
            - !Ref BatchPublicSubnetB
          SecurityGroups:
            - !Ref NovaBridgeServiceSecurityGroup
      LoadBalancers:
        - ContainerName: nova-bridge
          ContainerPort: 8080
          TargetGroupArn: !Ref NovaBridgeTargetGroup

  # ------------------------------------------------------------------
  # EventBridge Scheduler (set_timer / set_reminder one-shot schedules)
  # ------------------------------------------------------------------
  SchedulerGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: live-ninja

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: live-ninja-scheduler
      Description: Assumed by EventBridge Scheduler to deliver timer/reminder payloads to the email queue.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: email-queue-send
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EmailEnqueue
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt EmailQueue.Arn

  # ------------------------------------------------------------------
  # IoT Core baseline
  # ------------------------------------------------------------------
  IotThingType:
    Type: AWS::IoT::ThingType
    Properties:
      ThingTypeName: liveninja-tab5

  IotThingGroup:
    Type: AWS::IoT::ThingGroup
    Properties:
      ThingGroupName: liveninja-fleet

  IotDevicePolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: live-ninja-device
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iot:Connect
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/${!iot:Connection.Thing.ThingName}"
            Condition:
              Bool:
                iot:Connection.Thing.IsAttached: "true"
          - Effect: Allow
            Action:
              - iot:Publish
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/liveninja/${!iot:Connection.Thing.ThingName}/*"
          - Effect: Allow
            Action:
              - iot:Subscribe
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/liveninja/${!iot:Connection.Thing.ThingName}/*"
          - Effect: Allow
            Action:
              - iot:Receive
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/liveninja/${!iot:Connection.Thing.ThingName}/*"

  # ------------------------------------------------------------------
  # CloudFront + Route 53 edge
  # ------------------------------------------------------------------
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: live-ninja-security-headers
        Comment: HSTS, nosniff, referrer policy, clickjacking protection; CSP left to the app.
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: false
            Preload: false
            Override: true
          ContentTypeOptions:
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true

  # WAFv2 does NOT support associating a WebACL with an HTTP API (v2) —
  # AWS::WAFv2::WebACLAssociation only accepts APPLICATION_LOAD_BALANCER,
  # API_GATEWAY (REST/v1), APPSYNC, COGNITO_USER_POOL, APP_RUNNER_SERVICE,
  # and VERIFIED_ACCESS_INSTANCE as resource types (verified against the
  # WAFv2 resource-type enum; HTTP API and CloudFront are both absent from
  # WebACLAssociation's allowed list). So this WebACL is CLOUDFRONT-scope
  # and attaches directly via CloudFrontDistribution's WebACLId property
  # instead, which is the only supported path for an HTTP-API-backed
  # CloudFront distribution. CLOUDFRONT scope requires the WebACL be
  # created in us-east-1 — this stack already deploys there (samconfig.toml).
  EdgeWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: live-ninja-edge
      Scope: CLOUDFRONT
      Description: Rate limiting + AWS managed common rule set in front of the live-ninja CloudFront distribution.
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: live-ninja-edge
      Rules:
        - Name: RateLimitPerIP
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000
              EvaluationWindowSec: 300
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: live-ninja-rate-limit
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
              # SizeRestrictions_BODY defaults to blocking any request body
              # over 8KB. POST /api/v1/fallback/stt accepts a multipart
              # audio upload up to 25MB (internal/webapp/api_routes.go,
              # io.LimitReader(f, 25<<20)) through this same CloudFront
              # distribution/origin, so the managed rule's default Block
              # action would break that upload path. Every other POST body
              # on this API (transcript batches, tool invokes, JSON turns)
              # is well under 8KB, so only this one sub-rule is downgraded
              # to Count instead of excluding the whole managed group.
              RuleActionOverrides:
                - Name: SizeRestrictions_BODY
                  ActionToUse:
                    Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: live-ninja-common-rules

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: live-ninja edge for live.jeremy.ninja
        Aliases:
          - !Ref DomainName
        WebACLId: !GetAtt EdgeWebACL.Arn
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: http-api
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
          # M12: the nova-bridge ALB (HTTP; TLS terminated here at CloudFront).
          # WebSocket upgrades to Bedrock Nova Sonic ride this origin under the
          # /nova/* behavior below. OriginReadTimeout is bumped to CloudFront's
          # 60s max so a slow first WS response is not cut short.
          - !If
            - NovaBridgeReady
            - Id: nova-bridge
              DomainName: !GetAtt NovaBridgeAlb.DNSName
              CustomOriginConfig:
                OriginProtocolPolicy: http-only
                HTTPPort: 80
                OriginReadTimeout: 60
            - !Ref "AWS::NoValue"
          # Oversized static binaries (ORT WASM, wake models) served from S3.
          - Id: assets-s3
            DomainName: !Sub "${AssetsBucket}.s3.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !GetAtt AssetsOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: http-api
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          # Managed policies: CachingDisabled + AllViewerExceptHostHeader
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        CacheBehaviors:
          # More-specific S3-backed patterns MUST precede /static/* (CloudFront
          # uses the first matching behavior in order). These serve the oversized
          # ORT WASM + wake-word models that can't go through Lambda.
          - PathPattern: /static/vendor/*
            TargetOriginId: assets-s3
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          - PathPattern: /static/models/*
            TargetOriginId: assets-s3
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          - PathPattern: /static/*
            TargetOriginId: http-api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            # Managed policy: CachingOptimized
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          # M12: WebSocket bridge to Nova Sonic. CloudFront supports WebSocket
          # transparently; the client opens wss://live.jeremy.ninja/nova/session
          # and CloudFront proxies the Upgrade to the ALB origin. No caching
          # (CachingDisabled) and the AllViewer origin-request policy so the
          # Upgrade / Connection / Sec-WebSocket-* headers, query string (the JWT
          # is a query param) and everything else are forwarded verbatim. Compress
          # is off — a WebSocket stream must not be content-encoded.
          - !If
            - NovaBridgeReady
            - PathPattern: /nova/*
              TargetOriginId: nova-bridge
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
                - OPTIONS
                - PUT
                - POST
                - PATCH
                - DELETE
              CachedMethods:
                - GET
                - HEAD
              Compress: false
              # Managed policies: CachingDisabled + AllViewer (forwards all headers
              # incl. the WebSocket upgrade set, all cookies, all query strings).
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
              OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
              ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            - !Ref "AWS::NoValue"

  DnsRecordA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainName}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  DnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainName}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # ------------------------------------------------------------------
  # Ops: SNS topic, alarms, budgets
  # ------------------------------------------------------------------
  OpsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: live-ninja-ops
      Subscription:
        - Protocol: email
          Endpoint: proffitt.jeremy@gmail.com

  # M7: explicit topic policy — SES event publishing (bounce/complaint
  # destination below) requires ses.amazonaws.com be granted sns:Publish;
  # an AWS::SNS::TopicPolicy replaces the default policy wholesale, so the
  # owner + CloudWatch-alarms statements are restated here.
  OpsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref OpsTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: OwnerAccess
            Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - sns:Publish
              - sns:Subscribe
              - sns:Receive
              - sns:GetTopicAttributes
              - sns:ListSubscriptionsByTopic
            Resource: !Ref OpsTopic
            Condition:
              StringEquals:
                AWS:SourceOwner: !Ref AWS::AccountId
          - Sid: CloudWatchAlarmsPublish
            Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref OpsTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: SesEventPublish
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: sns:Publish
            Resource: !Ref OpsTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # M7: SES bounce/complaint visibility via SNS -> ops email ($0 — no
  # Firehose/EventBridge event bus needed). email-dispatch passes
  # EMAIL_CONFIGURATION_SET on every SendEmail so events flow through here.
  SesConfigurationSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: live-ninja

  SesBounceEventDestination:
    Type: AWS::SES::ConfigurationSetEventDestination
    Properties:
      ConfigurationSetName: !Ref SesConfigurationSet
      EventDestination:
        Name: ops-sns-bounces
        Enabled: true
        MatchingEventTypes:
          - bounce
          - complaint
        SnsDestination:
          TopicARN: !Ref OpsTopic

  # M7: single-pane ops dashboard. Custom metrics are EMF-emitted
  # (internal/observ) so SEARCH expressions are used for them — they match
  # whatever dimension values appear without hardcoding Surface/Tool/Kind
  # value lists.
  OpsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: live-ninja-ops
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text", "x": 0, "y": 0, "width": 24, "height": 3,
              "properties": {
                "markdown": "## live-ninja-ops\nAll times UTC. Custom metrics are EMF from `internal/observ` (namespaces `LiveNinja/*`).\n\n**Budgets (no CloudWatch metric — see AWS Budgets console):** monthly cost budgets at **$20 / $50 / $100**, each emailing proffitt.jeremy@gmail.com at 100% of actual spend, filtered to tag `Project=live-ninja`. For per-service breakdown use Cost Explorer grouped by `USAGE_TYPE` with the same tag filter."
              }
            },
            {
              "type": "metric", "x": 0, "y": 3, "width": 8, "height": 6,
              "properties": {
                "title": "Broker mint latency (ms)",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ { "expression": "SEARCH('{LiveNinja/RealtimeBroker,Surface} MetricName=\"EphemeralTokenMintLatency\"', 'Average', 300)", "id": "mintAvg", "label": "avg" } ],
                  [ { "expression": "SEARCH('{LiveNinja/RealtimeBroker,Surface} MetricName=\"EphemeralTokenMintLatency\"', 'p99', 300)", "id": "mintP99", "label": "p99" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 8, "y": 3, "width": 8, "height": 6,
              "properties": {
                "title": "Broker mint errors + quota/rate rejections",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ { "expression": "SEARCH('{LiveNinja/RealtimeBroker,Surface} MetricName=\"MintErrors\"', 'Sum', 300)", "id": "mintErr", "label": "MintErrors" } ],
                  [ { "expression": "SEARCH('{LiveNinja/RealtimeBroker,Kind} MetricName=\"QuotaRejections\"', 'Sum', 300)", "id": "quotaRej", "label": "QuotaRejections" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 16, "y": 3, "width": 8, "height": 6,
              "properties": {
                "title": "Sessions brokered (by surface)",
                "view": "timeSeries", "stacked": true, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ { "expression": "SEARCH('{LiveNinja/RealtimeBroker,Surface} MetricName=\"SessionsBrokered\"', 'Sum', 300)", "id": "sessions", "label": "SessionsBrokered" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 0, "y": 9, "width": 8, "height": 6,
              "properties": {
                "title": "Tool invocations (tool/outcome/surface)",
                "view": "timeSeries", "stacked": true, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ { "expression": "SEARCH('{LiveNinja/Tools,Outcome,Surface,Tool} MetricName=\"ToolInvocations\"', 'Sum', 300)", "id": "tools", "label": "ToolInvocations" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 8, "y": 9, "width": 8, "height": 6,
              "properties": {
                "title": "HTTP API 4xx / 5xx",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ "AWS/ApiGateway", "4xx", "ApiId", "${HttpApi}", { "stat": "Sum", "label": "4xx" } ],
                  [ "AWS/ApiGateway", "5xx", "ApiId", "${HttpApi}", { "stat": "Sum", "label": "5xx", "color": "#d62728" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 16, "y": 9, "width": 8, "height": 6,
              "properties": {
                "title": "DynamoDB consumed capacity (flat reads = no Scan)",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${Table}", { "stat": "Sum", "label": "RCU" } ],
                  [ "AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${Table}", { "stat": "Sum", "label": "WCU" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 0, "y": 15, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda errors (per function)",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-web", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-authorizer", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-realtime-broker", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-iot-ingest", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-shadow-ingest", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-usage-rollup", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-email-dispatch", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-deliverables-zipper", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-topics-extract", { "stat": "Sum" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "live-ninja-account-purge", { "stat": "Sum" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 12, "y": 15, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda duration p99 (ms, per function)",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-web", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-authorizer", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-realtime-broker", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-iot-ingest", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-shadow-ingest", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-usage-rollup", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-email-dispatch", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-deliverables-zipper", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-topics-extract", { "stat": "p99" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "live-ninja-account-purge", { "stat": "p99" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 0, "y": 21, "width": 12, "height": 6,
              "properties": {
                "title": "Email queue depth (visible messages)",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ "AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "live-ninja-email", { "stat": "Maximum", "label": "email" } ],
                  [ "AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "live-ninja-email-dlq", { "stat": "Maximum", "label": "email-dlq", "color": "#d62728" } ]
                ]
              }
            },
            {
              "type": "metric", "x": 12, "y": 21, "width": 12, "height": 6,
              "properties": {
                "title": "Telemetry Firehose (records in / delivered to S3)",
                "view": "timeSeries", "stacked": false, "region": "${AWS::Region}", "period": 300,
                "metrics": [
                  [ "AWS/Firehose", "IncomingRecords", "DeliveryStreamName", "live-ninja-telemetry", { "stat": "Sum", "label": "in" } ],
                  [ "AWS/Firehose", "DeliveryToS3.Records", "DeliveryStreamName", "live-ninja-telemetry", { "stat": "Sum", "label": "to S3" } ]
                ]
              }
            }
          ]
        }

