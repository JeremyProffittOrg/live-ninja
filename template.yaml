Outputs:
  HttpApiEndpoint:
    Description: HTTP API invoke URL (origin behind CloudFront).
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  CloudFrontDomain:
    Description: CloudFront distribution domain name.
    Value: !GetAtt CloudFrontDistribution.DomainName
  TableName:
    Description: DynamoDB single-table name.
    Value: !Ref Table
  OpsTopicArn:
    Description: SNS ops/alerts topic ARN.
    Value: !Ref OpsTopic
  DeliverablesBucketName:
    Description: S3 bucket holding user deliverables (M9, 180-day lifecycle).
    Value: !Ref DeliverablesBucket
  WakewordTrainRepositoryUri:
    Description: ECR repository URI the deploy workflow pushes the wakeword-train image to.
    Value: !GetAtt WakewordTrainRepo.RepositoryUri
  WakewordTrainJobQueueArn:
    Description: AWS Batch job queue ARN for wake-word training submissions.
    Value: !Ref WakewordTrainJobQueue
  WakewordTrainJobDefinitionArn:
    Description: AWS Batch job definition ARN (revision-pinned) for wake-word training.
    Value: !Ref WakewordTrainJobDefinition
  TelemetryDeliveryStreamName:
    Description: Direct PUT Firehose stream the web function batches telemetry events into (M7).
    Value: !Ref TelemetryDeliveryStream
  AnalyticsBucketName:
    Description: S3 bucket holding the gzip'd telemetry lake + Athena query results (M7).
    Value: !Ref AnalyticsBucket
  AthenaWorkGroupName:
    Description: Athena workgroup for querying live_ninja.telemetry_events (M7).
    Value: !Ref AnalyticsWorkGroup
  OpsDashboardName:
    Description: CloudWatch ops dashboard (M7).
    Value: !Ref OpsDashboard
  NovaBridgeRepositoryUri:
    Condition: NovaBridgeReady
    Description: ECR repository URI the deploy workflow pushes the nova-bridge image to (M12).
    Value: !GetAtt NovaBridgeRepo.RepositoryUri
  NovaBridgeClusterName:
    Condition: NovaBridgeReady
    Description: ECS cluster hosting the nova-bridge Fargate service (M12).
    Value: !Ref NovaBridgeCluster
  NovaBridgeServiceName:
    Condition: NovaBridgeReady
    Description: nova-bridge ECS service name (used by the container-bootstrap scale-to-1 step) (M12).
    Value: !GetAtt NovaBridgeService.Name
  NovaBridgeAlbDnsName:
    Condition: NovaBridgeReady
    Description: Internal-only (CloudFront-fronted) ALB DNS name for the nova-bridge service (M12).
    Value: !GetAtt NovaBridgeAlb.DNSName
  NovaBridgeWsUrl:
    Condition: NovaBridgeReady
    Description: WebSocket URL the realtime session bootstrap hands to nova-sonic-pinned clients (M12).
    Value: !Sub "wss://${DomainName}/nova/session"
