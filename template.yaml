AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  live-ninja - LWA-gated voice assistant platform (web / Android / M5Stack Tab5)
  around OpenAI GPT Realtime. M0 bootstrap stack: Fiber web app behind Lambda Web
  Adapter, HTTP API, single-table DynamoDB, KMS auth/JWT keys, S3 buckets, SQS email
  pipeline, IoT baseline, CloudFront + Route 53 edge, alarms and budgets.

Parameters:
  DomainName:
    Type: String
    Default: live.jeremy.ninja
    Description: Public domain served by CloudFront.
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (us-east-1) covering DomainName.
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone that DomainName lives in.
  OpenAIRealtimeModel:
    Type: String
    Default: gpt-realtime
    Description: OpenAI Realtime model id the realtime broker mints client secrets for.
  WakewordTrainImageTag:
    Type: String
    Default: latest
    Description: >-
      Image tag of the wakeword-train container the Batch job definition references.
      The deploy workflow pushes both :latest and :<git sha>; default tracks :latest
      so a container push alone (no template change) is picked up by the next job.

Globals:
  Function:
    Runtime: provided.al2023
    Handler: bootstrap
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref Table
        LOG_LEVEL: info

Resources:
  # ------------------------------------------------------------------
  # HTTP API (no custom domain here - CloudFront fronts it)
  # ------------------------------------------------------------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: LambdaAuthorizer
        Authorizers:
          LambdaAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
            EnableFunctionDefaultPermissions: true
            # Deliberately NO Identity block (no identity sources, no caching):
            # HTTP API returns 401 without invoking the authorizer when a
            # configured identity-source header is absent, which would break
            # public routes (/, /healthz, /static/*, /auth/*, jwks, OPTIONS).
            # With no identity sources the authorizer runs on every request and
            # itself allows the public-path allowlist (it receives
            # requestContext.http.path) while denying everything else.

  # ------------------------------------------------------------------
  # Lambda functions
  # ------------------------------------------------------------------
  WebFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-web
      Description: Go Fiber app behind Lambda Web Adapter; serves /healthz and all routes.
      CodeUri: .build/web/
      MemorySize: 512
      Layers:
        - arn:aws:lambda:us-east-1:753240598075:layer:LambdaAdapterLayerArm64:25
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          PORT: "8080"
          RUST_LOG: info
          DOMAIN_NAME: !Ref DomainName
          EMAIL_QUEUE_URL: !Ref EmailQueue
          JWT_KMS_KEY_ID: !GetAtt JwtKey.Arn
          AUTH_KMS_KEY_ID: !GetAtt AuthKey.Arn
          BROKER_FUNCTION_NAME: !Ref RealtimeBrokerFunction
          SCHEDULER_GROUP: !Ref SchedulerGroup
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerRole.Arn
          OWNER_EMAIL: proffitt.jeremy@gmail.com
          # M6/M9 (wake word training + deliverables). No IOT_DATA_ENDPOINT env:
          # the app resolves the IoT data-plane endpoint at runtime via a cached
          # iot:DescribeEndpoint call (permission granted below) instead of a
          # CloudFormation custom resource — deliberate, keeps the stack free of
          # custom-resource Lambdas.
          WAKEWORDS_BUCKET: !Ref WakewordsBucket
          DELIVERABLES_BUCKET: !Ref DeliverablesBucket
          BATCH_JOB_QUEUE: !Ref WakewordTrainJobQueue
          BATCH_JOB_DEFINITION: !Ref WakewordTrainJobDefinition
          ZIPPER_FUNCTION_NAME: !Ref DeliverablesZipperFunction
          # M10/M11: memory-layer embeddings (DynamoDB-native EMB# store; no
          # S3 Vectors resources - see internal/memory) + post-session topic
          # extraction trigger.
          BEDROCK_EMBED_MODEL: amazon.titan-embed-text-v2:0
          TOPICS_EXTRACT_FUNCTION_NAME: !Ref TopicsExtractFunction
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableCrud
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:BatchGetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:BatchWriteItem
                - dynamodb:ConditionCheckItem
                - dynamodb:TransactGetItems
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"
            - Sid: LwaParams
              Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/live-ninja/prod/lwa/*"
            - Sid: SsmSecureStringDecrypt
              Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
            - Sid: JwtSign
              Effect: Allow
              Action:
                - kms:Sign
                - kms:GetPublicKey
              Resource:
                - !GetAtt JwtKey.Arn
            - Sid: AuthCrypto
              Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource:
                - !GetAtt AuthKey.Arn
            - Sid: EmailEnqueue
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt EmailQueue.Arn
            - Sid: InvokeRealtimeBroker
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt RealtimeBrokerFunction.Arn
            - Sid: DeviceControlPublish
              Effect: Allow
              Action:
                - iot:Publish
              Resource:
                - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/liveninja/*"
            - Sid: TimerSchedules
              Effect: Allow
              Action:
                - scheduler:CreateSchedule
              Resource:
                - !Sub "arn:${AWS::Partition}:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/live-ninja/*"
            - Sid: PassSchedulerRole
              Effect: Allow
              Action:
                - iam:PassRole
              Resource:
                - !GetAtt SchedulerRole.Arn
              Condition:
                StringEquals:
                  iam:PassedToService: scheduler.amazonaws.com
            # ---- M6: wake-word training (AWS Batch) ----
            - Sid: WakewordTrainSubmit
              Effect: Allow
              Action:
                - batch:SubmitJob
              Resource:
                # Job-definition ARN without the revision suffix so newer
                # revisions stay submittable without a policy update.
                - !Ref WakewordTrainJobQueue
                - !Sub "arn:${AWS::Partition}:batch:${AWS::Region}:${AWS::AccountId}:job-definition/live-ninja-wakeword-train*"
            - Sid: WakewordTrainDescribe
              Effect: Allow
              Action:
                - batch:DescribeJobs
              # batch:DescribeJobs does not support resource-level permissions.
              Resource: "*"
            - Sid: WakewordModelsRw
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                # Model layout per contracts/wakeword-manifest.md:
                # wakewords/<wwId>/<platform>/model.onnx + manifest.json
                - !Sub "${WakewordsBucket.Arn}/wakewords/*"
            - Sid: WakewordModelsList
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt WakewordsBucket.Arn
              Condition:
                StringLike:
                  s3:prefix: "wakewords/*"
            # ---- M6: settings fan-out to the M5Stack via IoT named shadow
            # "config" (contracts/shadow.md). Shadow actions are resourced on
            # the Thing ARN; the "config" shadow name is enforced in code
            # (there is no reliable IAM condition key for named shadows).
            - Sid: ConfigShadowRw
              Effect: Allow
              Action:
                - iot:GetThingShadow
                - iot:UpdateThingShadow
              Resource:
                - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*"
            # Runtime discovery of the account's IoT data-plane (ATS) endpoint;
            # called once per cold start and cached (replaces an IOT_DATA_ENDPOINT
            # env / CFN custom resource). No resource-level support.
            - Sid: IotEndpointDiscovery
              Effect: Allow
              Action:
                - iot:DescribeEndpoint
              Resource: "*"
            # ---- M9: deliverables store ----
            - Sid: DeliverablesRw
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource:
                # deliverables/<uid>/... — download handlers MUST additionally
                # prefix-check deliverables/<uid>/ before presigning (api.md).
                - !Sub "${DeliverablesBucket.Arn}/deliverables/*"
            - Sid: DeliverablesList
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt DeliverablesBucket.Arn
              Condition:
                StringLike:
                  s3:prefix: "deliverables/*"
            - Sid: InvokeDeliverablesZipper
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt DeliverablesZipperFunction.Arn
            # ---- M10: memory-layer embeddings (DynamoDB-native EMB# store;
            # S3 Vectors SDK support not confirmed for the pinned aws-sdk-go-v2
            # version, so the locked fallback is a brute-force cosine scan
            # Query over each user's own EMB# partition - internal/memory).
            # Scoped to the single embedding model id; no other Bedrock models
            # or InvokeModel* actions are granted.
            - Sid: BedrockEmbedModel
              Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v2:0"
            # ---- M11: post-session topic extraction, direct async invoke
            # from the transcript sink when it sees {final:true}.
            - Sid: InvokeTopicsExtract
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt TopicsExtractFunction.Arn

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-authorizer
      Description: >-
        HTTP API v2 simple-response Lambda authorizer, attached to the HTTP API as
        DefaultAuthorizer (M1). Deny-by-default; allows only explicitly public routes.
      CodeUri: .build/authorizer/
      Environment:
        Variables:
          JWKS_URL: !Sub "https://${DomainName}/.well-known/jwks.json"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: UserReadForTokensValidAfter
              Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !GetAtt Table.Arn

  RealtimeBrokerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-realtime-broker
      Description: >-
        Direct-invoke realtime token broker (invoked by the web function in M2+).
        Sole holder of ssm:GetParameter on the OpenAI API key parameter.
      CodeUri: .build/realtime-broker/
      Environment:
        Variables:
          OPENAI_REALTIME_MODEL: !Ref OpenAIRealtimeModel
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableUsageBucketLog
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
            - Sid: OpenAiKeyParam
              Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/live-ninja/prod/openai/api_key"
            - Sid: SsmSecureStringDecrypt
              Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

  IotIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-iot-ingest
      Description: IoT rule target - parses device telemetry and records DEVICE#/TELEM lastSeen.
      CodeUri: .build/iot-ingest/
      Events:
        Telemetry:
          Type: IoTRule
          Properties:
            AwsIotSqlVersion: "2016-03-23"
            Sql: "SELECT *, topic(2) as deviceId FROM 'liveninja/+/telemetry'"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableWrite
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn

  ShadowIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-shadow-ingest
      Description: >-
        IoT rule target (M6) - consumes named-shadow "config" update/accepted events and
        folds device reported state back into DynamoDB (DEVICE# lastSeen/reportedVersion;
        never downgrades the canonical SETTINGS# version - contracts/shadow.md).
      CodeUri: .build/shadow-ingest/
      Events:
        ConfigShadowAccepted:
          Type: IoTRule
          Properties:
            AwsIotSqlVersion: "2016-03-23"
            # topic(3) is <thingName> in $aws/things/<thingName>/shadow/name/config/update/accepted
            Sql: "SELECT topic(3) as thingName, * FROM '$aws/things/+/shadow/name/config/update/accepted'"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableReconcile
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"
            # Re-publish desired when a device reports a stale settingsVersion
            # (self-healing push-down, contracts/shadow.md step 2/4). Named
            # shadow "config" enforced in code; shadow actions resource on the
            # Thing ARN.
            - Sid: ConfigShadowRepublish
              Effect: Allow
              Action:
                - iot:GetThingShadow
                - iot:UpdateThingShadow
              Resource:
                - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*"
            # Cached cold-start lookup of the IoT data-plane endpoint (no
            # IOT_DATA_ENDPOINT env / custom resource; no resource-level support).
            - Sid: IotEndpointDiscovery
              Effect: Allow
              Action:
                - iot:DescribeEndpoint
              Resource: "*"

  UsageRollupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-usage-rollup
      Description: Hourly usage rollup - Query-only reads of the USAGE partition, emits EMF metrics.
      CodeUri: .build/usage-rollup/
      Timeout: 60
      Events:
        Hourly:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Description: live-ninja hourly usage rollup
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableQuery
              Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"

  EmailDispatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-email-dispatch
      Description: SQS consumer - sends templated email via SES with DynamoDB idempotency.
      CodeUri: .build/email-dispatch/
      Events:
        EmailJobs:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailQueue.Arn
            BatchSize: 10
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: SesSend
              Effect: Allow
              Action:
                - ses:SendEmail
              Resource:
                - !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/jeremy.ninja"
                - !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/jeremy@jeremy.ninja"
            - Sid: IdempotencyWrite
              Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                - !GetAtt Table.Arn
            - Sid: QueueConsume
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource:
                - !GetAtt EmailQueue.Arn

  DeliverablesZipperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-deliverables-zipper
      Description: >-
        Direct-invoke streaming zipper (M9) - invoked async by the web function's
        deliverable_zip tool; streams S3 objects through archive/zip + io.Pipe into a
        new deliverable object (no /tmp spooling of the full archive).
      CodeUri: .build/deliverables-zipper/
      MemorySize: 512
      Timeout: 300
      Environment:
        Variables:
          DELIVERABLES_BUCKET: !Ref DeliverablesBucket
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableDeliverables
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
                - !Sub "${Table.Arn}/index/*"
            - Sid: DeliverablesRw
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:AbortMultipartUpload
              Resource:
                - !Sub "${DeliverablesBucket.Arn}/deliverables/*"
            - Sid: DeliverablesList
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt DeliverablesBucket.Arn
              Condition:
                StringLike:
                  s3:prefix: "deliverables/*"

  TopicsExtractFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: live-ninja-topics-extract
      Description: >-
        Direct-invoke post-session topic extraction (M11) - invoked async by the web
        function on {final:true}. Queries a session's LOG# turns, calls the realtime
        broker's "extract-topics" mode, writes CONV#/TOPICREF#/TOPIC# items. Query-only.
      CodeUri: .build/topics-extract/
      Timeout: 60
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: TableConversationsAndTopics
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt Table.Arn
            - Sid: InvokeRealtimeBrokerExtractTopics
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt RealtimeBrokerFunction.Arn

  # ------------------------------------------------------------------
  # DynamoDB single table
  # ------------------------------------------------------------------
  Table:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: live-ninja
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ------------------------------------------------------------------
  # KMS keys
  # ------------------------------------------------------------------
  AuthKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: live-ninja auth key - envelope encryption of LWA refresh tokens and auth material.
      KeySpec: SYMMETRIC_DEFAULT
      KeyUsage: ENCRYPT_DECRYPT
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AccountRootAdmin
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"

  AuthKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/live-ninja-auth
      TargetKeyId: !Ref AuthKey

  JwtKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: live-ninja JWT signing key - ES256 (ECC_NIST_P256); private key never leaves KMS.
      KeySpec: ECC_NIST_P256
      KeyUsage: SIGN_VERIFY
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AccountRootAdmin
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"

  JwtKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/live-ninja-jwt
      TargetKeyId: !Ref JwtKey

  # ------------------------------------------------------------------
  # S3 buckets
  # ------------------------------------------------------------------
  UserBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-user-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  WakewordsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-wakewords-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-assets-759775734231
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  LogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-logs-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AnalyticsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-analytics-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  DeliverablesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: live-ninja-deliverables-759775734231
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          # M9: deliverables are transient work products - expire after 180 days
          # (locked decision) and clean up abandoned multipart zip uploads.
          - Id: expire-deliverables-180d
            Status: Enabled
            ExpirationInDays: 180
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # ------------------------------------------------------------------
  # SQS email pipeline
  # ------------------------------------------------------------------
  EmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: live-ninja-email
      VisibilityTimeout: 180
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailDeadLetterQueue.Arn
        maxReceiveCount: 5

  EmailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: live-ninja-email-dlq
      MessageRetentionPeriod: 1209600

  # ------------------------------------------------------------------
  # M6: wake-word training - ECR + AWS Batch on Fargate (arm64)
  #
  # openWakeWord training runs as a Batch job (2 vCPU / 8 GB, 20-min hard
  # timeout). Concurrency <= 2 is enforced structurally: MaxvCpus 4 with
  # 2-vCPU jobs means at most two run at once; the <=3/day/user quota is
  # enforced by the web function before SubmitJob. Porcupine has NO
  # server-side training path (needs a Picovoice account - locked
  # decision); openWakeWord is the only engine trained here.
  #
  # Fargate requires VPC networking; the account has no stack VPC, so a
  # minimal dedicated VPC (public subnets + IGW, NO NAT gateway - $0
  # recurring) is created here. Jobs get a public IP for ECR pulls and
  # S3/DynamoDB/SQS access; the security group allows egress only.
  # ------------------------------------------------------------------
  WakewordTrainRepo:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: live-ninja-wakeword-train
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: '{"rules":[{"rulePriority":1,"description":"keep last 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}'

  BatchVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: live-ninja-batch

  BatchInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: live-ninja-batch

  BatchVpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref BatchVpc
      InternetGatewayId: !Ref BatchInternetGateway

  BatchPublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref BatchVpc
      CidrBlock: 10.42.0.0/20
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: live-ninja-batch-a

  BatchPublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref BatchVpc
      CidrBlock: 10.42.16.0/20
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: live-ninja-batch-b

  BatchRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BatchVpc
      Tags:
        - Key: Name
          Value: live-ninja-batch

  BatchDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: BatchVpcGatewayAttachment
    Properties:
      RouteTableId: !Ref BatchRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref BatchInternetGateway

  BatchSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref BatchPublicSubnetA
      RouteTableId: !Ref BatchRouteTable

  BatchSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref BatchPublicSubnetB
      RouteTableId: !Ref BatchRouteTable

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: live-ninja wakeword-train Fargate tasks - egress only, no ingress.
      VpcId: !Ref BatchVpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all egress (ECR pull, S3/DynamoDB/SQS, TTS asset fetch).

  WakewordTrainExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: live-ninja-wakeword-train-exec
      Description: ECS task execution role for wakeword-train Batch jobs (ECR pull + CloudWatch logs).
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  WakewordTrainJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: live-ninja-wakeword-train-job
      Description: >-
        Task role assumed by the wakeword-train container: upload trained models +
        manifests to the wakewords bucket, flip WAKEWORD# status in DynamoDB, and
        enqueue the SES "ready" email.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: wakeword-train
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ModelUpload
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource:
                  - !Sub "${WakewordsBucket.Arn}/wakewords/*"
              - Sid: WakewordStatus
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt Table.Arn
              - Sid: ReadyEmailEnqueue
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt EmailQueue.Arn

  WakewordTrainComputeEnv:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: live-ninja-wakeword-train
      Type: MANAGED
      State: ENABLED
      # No ServiceRole: Batch uses the AWSServiceRoleForBatch service-linked role.
      ComputeResources:
        Type: FARGATE
        MaxvCpus: 4
        Subnets:
          - !Ref BatchPublicSubnetA
          - !Ref BatchPublicSubnetB
        SecurityGroupIds:
          - !Ref BatchSecurityGroup

  WakewordTrainJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: live-ninja-wakeword-train
      State: ENABLED
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref WakewordTrainComputeEnv

  WakewordTrainJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: live-ninja-wakeword-train
      Type: container
      PlatformCapabilities:
        - FARGATE
      # 20-minute hard timeout (locked decision) - Batch kills the task after this.
      Timeout:
        AttemptDurationSeconds: 1200
      RetryStrategy:
        Attempts: 1
      ContainerProperties:
        Image: !Sub "${WakewordTrainRepo.RepositoryUri}:${WakewordTrainImageTag}"
        ResourceRequirements:
          - Type: VCPU
            Value: "2"
          - Type: MEMORY
            Value: "8192"
        RuntimePlatform:
          CpuArchitecture: ARM64
          OperatingSystemFamily: LINUX
        NetworkConfiguration:
          AssignPublicIp: ENABLED
        ExecutionRoleArn: !GetAtt WakewordTrainExecutionRole.Arn
        JobRoleArn: !GetAtt WakewordTrainJobRole.Arn
        # Per-job parameters (wwId, userId, phrase) are passed by SubmitJob
        # containerOverrides.environment from the web function.
        Environment:
          - Name: TABLE_NAME
            Value: !Ref Table
          - Name: WAKEWORDS_BUCKET
            Value: !Ref WakewordsBucket
          - Name: EMAIL_QUEUE_URL
            Value: !Ref EmailQueue

  # ------------------------------------------------------------------
  # EventBridge Scheduler (set_timer / set_reminder one-shot schedules)
  # ------------------------------------------------------------------
  SchedulerGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: live-ninja

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: live-ninja-scheduler
      Description: Assumed by EventBridge Scheduler to deliver timer/reminder payloads to the email queue.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: email-queue-send
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EmailEnqueue
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt EmailQueue.Arn

  # ------------------------------------------------------------------
  # IoT Core baseline
  # ------------------------------------------------------------------
  IotThingType:
    Type: AWS::IoT::ThingType
    Properties:
      ThingTypeName: liveninja-tab5

  IotThingGroup:
    Type: AWS::IoT::ThingGroup
    Properties:
      ThingGroupName: liveninja-fleet

  IotDevicePolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: live-ninja-device
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iot:Connect
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/${!iot:Connection.Thing.ThingName}"
            Condition:
              Bool:
                iot:Connection.Thing.IsAttached: "true"
          - Effect: Allow
            Action:
              - iot:Publish
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/liveninja/${!iot:Connection.Thing.ThingName}/*"
          - Effect: Allow
            Action:
              - iot:Subscribe
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/liveninja/${!iot:Connection.Thing.ThingName}/*"
          - Effect: Allow
            Action:
              - iot:Receive
            Resource:
              - !Sub "arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/liveninja/${!iot:Connection.Thing.ThingName}/*"

  # ------------------------------------------------------------------
  # CloudFront + Route 53 edge
  # ------------------------------------------------------------------
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: live-ninja-security-headers
        Comment: HSTS, nosniff, referrer policy, clickjacking protection; CSP left to the app.
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: false
            Preload: false
            Override: true
          ContentTypeOptions:
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: live-ninja edge for live.jeremy.ninja
        Aliases:
          - !Ref DomainName
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: http-api
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: http-api
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          # Managed policies: CachingDisabled + AllViewerExceptHostHeader
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        CacheBehaviors:
          - PathPattern: /static/*
            TargetOriginId: http-api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            # Managed policy: CachingOptimized
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy

  DnsRecordA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainName}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  DnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainName}."
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # ------------------------------------------------------------------
  # Ops: SNS topic, alarms, budgets
  # ------------------------------------------------------------------
  OpsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: live-ninja-ops
      Subscription:
        - Protocol: email
          Endpoint: proffitt.jeremy@gmail.com

  TableReadCapacityAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: live-ninja-table-read-capacity
      AlarmDescription: DynamoDB live-ninja consumed read capacity exceeds 50000 units in 5 minutes (possible Scan / runaway reads).
      Namespace: AWS/DynamoDB
      MetricName: ConsumedReadCapacityUnits
      Dimensions:
        - Name: TableName
          Value: !Ref Table
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 50000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsTopic

  TableWriteCapacityAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: live-ninja-table-write-capacity
      AlarmDescription: DynamoDB live-ninja consumed write capacity exceeds 25000 units in 5 minutes.
      Namespace: AWS/DynamoDB
      MetricName: ConsumedWriteCapacityUnits
      Dimensions:
        - Name: TableName
          Value: !Ref Table
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 25000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsTopic

  TableThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: live-ninja-table-throttles
      AlarmDescription: DynamoDB live-ninja read or write throttle events detected.
      Metrics:
        - Id: throttles
          Label: TotalThrottleEvents
          Expression: readThrottles + writeThrottles
          ReturnData: true
        - Id: readThrottles
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: AWS/DynamoDB
              MetricName: ReadThrottleEvents
              Dimensions:
                - Name: TableName
                  Value: !Ref Table
            Period: 300
            Stat: Sum
        - Id: writeThrottles
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: AWS/DynamoDB
              MetricName: WriteThrottleEvents
              Dimensions:
                - Name: TableName
                  Value: !Ref Table
            Period: 300
            Stat: Sum
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsTopic

  WebFunctionErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: live-ninja-web-errors
      AlarmDescription: live-ninja-web Lambda errors >= 5 in 5 minutes.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref WebFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsTopic

  HttpApi5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: live-ninja-http-5xx
      AlarmDescription: HTTP API 5xx responses >= 10 in 5 minutes.
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsTopic

  Budget20:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: live-ninja-monthly-20
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 20
          Unit: USD
        CostFilters:
          TagKeyValue:
            - user:Project$live-ninja
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: proffitt.jeremy@gmail.com

  Budget50:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: live-ninja-monthly-50
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 50
          Unit: USD
        CostFilters:
          TagKeyValue:
            - user:Project$live-ninja
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: proffitt.jeremy@gmail.com

  Budget100:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: live-ninja-monthly-100
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 100
          Unit: USD
        CostFilters:
          TagKeyValue:
            - user:Project$live-ninja
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: proffitt.jeremy@gmail.com

Outputs:
  HttpApiEndpoint:
    Description: HTTP API invoke URL (origin behind CloudFront).
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  CloudFrontDomain:
    Description: CloudFront distribution domain name.
    Value: !GetAtt CloudFrontDistribution.DomainName
  TableName:
    Description: DynamoDB single-table name.
    Value: !Ref Table
  OpsTopicArn:
    Description: SNS ops/alerts topic ARN.
    Value: !Ref OpsTopic
  DeliverablesBucketName:
    Description: S3 bucket holding user deliverables (M9, 180-day lifecycle).
    Value: !Ref DeliverablesBucket
  WakewordTrainRepositoryUri:
    Description: ECR repository URI the deploy workflow pushes the wakeword-train image to.
    Value: !GetAtt WakewordTrainRepo.RepositoryUri
  WakewordTrainJobQueueArn:
    Description: AWS Batch job queue ARN for wake-word training submissions.
    Value: !Ref WakewordTrainJobQueue
  WakewordTrainJobDefinitionArn:
    Description: AWS Batch job definition ARN (revision-pinned) for wake-word training.
    Value: !Ref WakewordTrainJobDefinition
